<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirect</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      font-family: Arial, sans-serif;
    }

    button {
      padding: 14px 28px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background: #43a047;
    }
  </style>
</head>
<body>

<button id="redirectBtn">Continue</button>
<script src="passlock.js"></script>
<script>
  // ===== CONFIG (frontend dev edits this) =====
  const TARGET_URL = "https://escr3.netlify.app/game.html";
  // ===========================================

  document.getElementById("redirectBtn").addEventListener("click", () => {
    let url = TARGET_URL.trim();

    // ensure protocol
    if (!url.startsWith("http://") && !url.startsWith("https://")) {
      url = "https://" + url;
    }

    window.location.href = url;
  });
</script>

</body>
</html>
